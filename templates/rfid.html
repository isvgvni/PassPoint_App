<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID Scanner - PassPoint</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .scanner-body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 60vh; text-align: center;
        }
        .rfid-button {
            width: 250px; height: 250px; border-radius: 50%; border: 8px solid #e0e0e0;
            background: white; cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .rfid-button:hover { border-color: var(--primary-green); transform: scale(1.05); }
        .rfid-button:active { transform: scale(0.95); background: #f0fdf4; }
        
        .wave { font-size: 60px; margin-bottom: 10px; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .status-msg { margin-top: 30px; font-weight: 500; color: var(--text-gray); }
    </style>
</head>
<body>
    <aside>
        <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" style="height: 35px; margin-right: 10px;">
            PassPoint
        </div>
        <button class="nav-btn" onclick="location.href='{{ url_for(`home`) }}'">🏠 Home</button>
        <button class="nav-btn" onclick="location.href='{{ url_for(`attendance`) }}'">📋 My Attendance</button>
        <button class="nav-btn" onclick="location.href='{{ url_for(`schedule`) }}'">🗓️ Schedule</button>
        <button class="nav-btn active" onclick="location.href='{{ url_for(`rfid`) }}'">🔍 Scan RFID</button>
    </aside>

    <main>
        <header>
            <h2>Device Connection: Ready</h2>
            <h1>RFID Attendance</h1>
        </header>

        <div class="scanner-body">
            <button class="rfid-button" onclick="scanSuccess()">
                <div class="wave">📡</div>
                <strong>TAP CARD</strong>
            </button>
            <p class="status-msg" id="status">Waiting for RFID card...</p>
        </div>
    </main>

    <script>
        function scanSuccess() {
            const status = document.getElementById('status');
            const btn = document.querySelector('.rfid-button');
            
            status.innerHTML = "Checking Card ID...";
            status.style.color = "var(--blue)";
            
            setTimeout(() => {
                status.innerHTML = "✅ Attendance Marked: Geo Sumanga";
                status.style.color = "var(--primary-green)";
                btn.style.borderColor = "var(--primary-green)";
                alert("Successfully scanned! Welcome to class.");
            }, 1500);
        }
    </script>
</body>
</html>
